<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium UI</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  padding: 0;
  /* font-family: Arial; */
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background: linear-gradient(135deg,#eef2ff,#e0e7ff);
  font-family: 'Poppins', sans-serif;
 }



.container{
  display:flex;
  gap:140px;
}


.phone{
  width:260px;
  height:520px;
  border-radius:40px;
  overflow:hidden;
  position:relative;
  background:white;
  box-shadow:0 25px 60px rgba(0,0,0,0.2);
  border:6px solid #111;
  animation: float 4s ease-in-out infinite;
}


@keyframes float{
  0%{ transform: translateY(0px); }
  50%{ transform: translateY(-12px); }
  100%{ transform: translateY(0px); }
}


.phone::before{
  content:'';
  position:absolute;
  top:0;
  left: 50%;
  transform:translateX(-50%);
  width:120px;
  height:20px;
  background:#111;
  border-bottom-left-radius:15px;
  border-bottom-right-radius:15px;
  z-index:5;
}


.title{
  position:absolute;
  top:25px;
  width:100%;
  text-align:center;
  font-size:16px;
  font-weight:bold;
}


.before{
  background:#f9fafb;
  color:black;
}

.before .card{
  margin-top:100px;
  background:white;
  padding:15px;
  width:80%;
  margin-left:auto;
  margin-right:auto;
  text-align:center;
  border:1px solid #ddd;
  border-radius:10px;
}

.before img{
  width:70px;
  border-radius:5px;
}

.before button{
  padding:6px 12px;
  background:#ccc;
  color:black;
  border:none;
  margin-top:10px;
  border-radius:5px;
}


.after{
  background: linear-gradient(135deg,#6366f1,#a5b4fc);
}

.after .card{
  margin-top:80px;
  margin-left:auto;
  margin-right:auto;
  width:85%;
  padding:20px;
  border-radius:20px;
  background: rgba(255,255,255,0.3);
  backdrop-filter: blur(20px);
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,0.25);
  transition:0.3s;
  border:1px solid rgba(255,255,255,0.3);
  pointer-events: auto;
}
/* .after .card:hover{
  transform: translateY(-5px) scale(1.03);
} */




.after img{
  width:110px;
  height:110px;
  border-radius:50%;
  margin-bottom:10px;
  border:3px solid white;
  object-fit: cover;
}
.after img:hover{
  box-shadow:0 0 30px rgba(255,255,255,0.6);
  transition:0.4s;
}


.skills span{
  display:inline-block;
  background-color: rgba(255,255,255,0.4);
  padding:5px 10px;
  margin:4px;
  border-radius:20px;
  font-size:11px;
}
.skills span:hover{
  background-color:#4f46e5;
  transform: scale(1.2);
  transition: 0.5s;
  cursor: pointer;
  color: #fff;
}


.btn{
  margin-top:12px;
  padding:10px 18px;
  border:none;
  border-radius:25px;
  background:white;
  color:#4f46e5;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}

.btn:hover{
  background:#4f46e5;
  color:white;
  box-shadow:0 0 20px rgba(79,70,229,0.7);
  transform: scale(1.05);
}


.phone::after{
  content:'';
  position:absolute;
  bottom:-120px;
  left:0;
  width:100%;
  height:100%;
  background:inherit;
  transform:scaleY(-1);
  opacity:0.1;
  filter: blur(10px);
  pointer-events: none;
}


.desc{
  font-size:13px;
  opacity:0.9;
}
</style>

</head>

<body>

<div class="container">
  <div class="phone before">
    <div class="title">Before</div>

    <div class="card">
    <img src="img/animetd.avif">
      <h3>Akshay</h3>
      <p>UI Designer</p>
      <button>Follow</button>
    </div>
  </div>


  <div class="phone after">
    <div class="title">After</div>

    <div class="card">
      <img src="img/udaipur3.jpg">
      <h3>Akshay Solanki</h3>
      <p class="desc">UI/UX Designer & Frontend Developer</p>

      <div class="skills">
        <span>Figma</span>
        <span>HTML</span>
        <span>CSS</span>
        <span>Bootstrap</span>
        <span>JavaScript</span>
        <span>AI</span>
      </div>

      <button class="btn">Follow</button>
    </div>
  </div>

</div>

</body>
</html>
